<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thermen Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .value {
      font-size: 48px;
      font-weight: bold;
    }

    h1 {
      margin-bottom: 30px;
    }

    .small {
      color: #9ca3af;
      margin-top: 10px;
    }
  </style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<div class="card">
  <h2>Verlauf</h2>
  <canvas id="chart"></canvas>
</div>
  <body>

<h1>Therme Bad Aibling Dashboard</h1>

<div class="card">
  <h2>Bad</h2>
  <div class="value" id="bad">--</div>
</div>

<div class="card">
  <h2>Sauna</h2>
  <div class="value" id="sauna">--</div>
</div>

<div class="card">
  <h2>Temperatur</h2>
  <div class="value" id="temp">--</div>
</div>
<div class="card">
  <h2>Status</h2>

  <div id="status"
       style="font-size:32px;font-weight:bold;">
    --
  </div>
</div>
  <h2>Letztes Update</h2>
  <div class="small" id="time">--</div>
</div>

<script>
async function loadData() {

  const response = await fetch('history.csv');

  const text = await response.text();

  const rows = text.trim().split('\n');

  const latest = rows[rows.length - 1].split(',');

  document.getElementById('bad').innerText =
    latest[1] + '%';

  document.getElementById('sauna').innerText =
    latest[2] + '%';

  document.getElementById('temp').innerText =
    latest[3] + '°C';
  const weatherCode = parseInt(latest[4]);

let weatherEmoji = '☁️';

if (weatherCode === 0) {
  weatherEmoji = '☀️';
}

if (weatherCode >= 1 && weatherCode <= 3) {
  weatherEmoji = '⛅';
}

if (weatherCode >= 51) {
  weatherEmoji = '🌧️';
}

document.getElementById('temp').innerText =
  weatherEmoji + ' ' + latest[3] + '°C';

  document.getElementById('time').innerText =
    latest[0];
  const sauna = parseInt(latest[2]);

let status = '🟢 Ruhig';

if (sauna > 70) {
  status = '🟡 Mittel';
}

if (sauna > 90) {
  status = '🔴 Sehr voll';
}

document.getElementById('status').innerText =
  status;
  const labels = [];
const badData = [];
const saunaData = [];

rows.slice(1).forEach(row => {

  const cols = row.split(',');

  labels.push(cols[0].slice(11,16));

  badData.push(cols[1]);

  saunaData.push(cols[2]);
});

const ctx = document.getElementById('chart');

new Chart(ctx, {
  type: 'line',

  data: {
    labels: labels,

    datasets: [
  {
    label: 'Bad',
    data: badData,
    borderColor: '#3b82f6',
    tension: 0.3
  },
  {
    label: 'Sauna',
    data: saunaData,
    borderColor: '#ef4444',
    tension: 0.3
  }
]
  }
});
}

loadData();
</script>

</body>
</html>
