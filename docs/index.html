<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thermen Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .value {
      font-size: 48px;
      font-weight: bold;
    }

    h1 {
      margin-bottom: 30px;
    }

    .small {
      color: #9ca3af;
      margin-top: 10px;
    }
  </style>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

  <div class="card">
  <h2>Durchschnitt nach Uhrzeit</h2>

  <div id="timeStats"></div>
</div>
  <div class="card">
  <h2>Beste Thermenzeit</h2>

  <div id="bestTime"></div>
</div>
  <div class="card">
  <h2>Statistik</h2>

  <div id="stats"></div>
</div>
<div class="card">
  <h2>Verlauf</h2>
  
  <canvas id="chart"></canvas>
</div>
  <body>

<h1>Therme Bad Aibling Dashboard</h1>

<div class="card">
  <h2>Bad</h2>
  <div class="value" id="bad">--</div>
</div>

<div class="card">
  <h2>Sauna</h2>
  <div class="value" id="sauna">--</div>
</div>

<div class="card">
  <h2>Temperatur</h2>
  <div class="value" id="temp">--</div>
</div>
<div class="card">
  <h2>Status</h2>

  <div id="status"
       style="font-size:32px;font-weight:bold;">
    --
  </div>
</div>
  <h2>Letztes Update</h2>
  <div class="small" id="time">--</div>
</div>

<script>
async function loadData() {

  const response = await fetch('history.csv');

  const text = await response.text();

  const rows = text.trim().split('\n');

  const latest = rows[rows.length - 1].split(',');

  document.getElementById('bad').innerText =
    latest[1] + '%';

  document.getElementById('sauna').innerText =
    latest[2] + '%';

  document.getElementById('temp').innerText =
    latest[3] + '°C';
  const weatherCode = parseInt(latest[4]);

let weatherEmoji = '☁️';

if (weatherCode === 0) {
  weatherEmoji = '☀️';
}

if (weatherCode >= 1 && weatherCode <= 3) {
  weatherEmoji = '⛅';
}

if (weatherCode >= 51) {
  weatherEmoji = '🌧️';
}

document.getElementById('temp').innerText =
  weatherEmoji + ' ' + latest[3] + '°C';

  document.getElementById('time').innerText =
    latest[0];
  const sauna = parseInt(latest[2]);

let status = '🟢 Ruhig';

if (sauna > 70) {
  status = '🟡 Mittel';
}

if (sauna > 90) {
  status = '🔴 Sehr voll';
}

document.getElementById('status').innerText =
  status;
  const labels = [];
const badData = [];
const saunaData = [];

rows.slice(1).forEach(row => {

  const cols = row.split(',');

  labels.push(cols[0].slice(11,16));

  badData.push(cols[1]);

  saunaData.push(cols[2]);
});

let bestIndex = 0;

rows.slice(1).forEach((row, index) => {

  const cols = row.split(',');

  if (
    Number(cols[2]) <
    Number(rows[bestIndex + 1].split(',')[2])
  ) {
    bestIndex = index;
  }
});

const bestRow =
  rows[bestIndex + 1].split(',');

document.getElementById('bestTime').innerHTML = `
  🟢 Niedrigste Sauna-Auslastung:<br><br>
  <b>${bestRow[2]}%</b><br><br>
  ${bestRow[0]}
`;
  const hourMap = {};

rows.slice(1).forEach(row => {

  const cols = row.split(',');

  const hour = cols[0].slice(11,13);

  if (!hourMap[hour]) {
    hourMap[hour] = [];
  }

  hourMap[hour].push(Number(cols[2]));
});

let html = '';

Object.keys(hourMap).forEach(hour => {

  const avg =
    Math.round(
      hourMap[hour]
        .reduce((a,b)=>a+b,0)
      / hourMap[hour].length
    );

  html += `
    ${hour}:00 → <b>${avg}%</b><br><br>
  `;
});

document.getElementById('timeStats').innerHTML =
  html;
  const saunaNumbers = saunaData.map(Number);

const avgSauna =
  Math.round(
    saunaNumbers.reduce((a,b)=>a+b,0)
    / saunaNumbers.length
  );

const maxSauna =
  Math.max(...saunaNumbers);

const minSauna =
  Math.min(...saunaNumbers);

document.getElementById('stats').innerHTML = `
  Durchschnitt Sauna: <b>${avgSauna}%</b><br><br>
  Höchste Auslastung: <b>${maxSauna}%</b><br><br>
  Niedrigste Auslastung: <b>${minSauna}%</b>
`;
const ctx = document.getElementById('chart');

new Chart(ctx, {
  type: 'line',

  data: {
    labels: labels,

    datasets: [
  {
    label: 'Bad',
    data: badData,
    borderColor: '#3b82f6',
    tension: 0.3
  },
  {
    label: 'Sauna',
    data: saunaData,
    borderColor: '#ef4444',
    tension: 0.3
  }
]
  }
});
}

loadData();
</script>

</body>
</html>
