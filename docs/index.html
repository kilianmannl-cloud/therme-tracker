<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thermen Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .value {
      font-size: 48px;
      font-weight: bold;
    }

    h1 {
      margin-bottom: 30px;
    }
  </style>
</head>

<body>

<h1>Therme Bad Aibling Dashboard</h1>

<div class="card">
  <h2>Bad</h2>
  <div class="value">79%</div>
</div>

<div class="card">
  <h2>Sauna</h2>
  <div class="value">99%</div>
</div>

<div class="card">
  <h2>Temperatur</h2>
  <div class="value">12°C</div>
</div>

</body>
</html>
