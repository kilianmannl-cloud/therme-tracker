<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thermen Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      padding: 20px;
    }

    .card {
      background: #1f2937;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .value {
      font-size: 48px;
      font-weight: bold;
    }

    h1 {
      margin-bottom: 30px;
    }

    .small {
      color: #9ca3af;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Therme Bad Aibling Dashboard</h1>

<div class="card">
  <h2>Bad</h2>
  <div class="value" id="bad">--</div>
</div>

<div class="card">
  <h2>Sauna</h2>
  <div class="value" id="sauna">--</div>
</div>

<div class="card">
  <h2>Temperatur</h2>
  <div class="value" id="temp">--</div>
</div>

<div class="card">
  <h2>Letztes Update</h2>
  <div class="small" id="time">--</div>
</div>

<script>
async function loadData() {

  const response = await fetch('../data/history.csv');

  const text = await response.text();

  const rows = text.trim().split('\n');

  const latest = rows[rows.length - 1].split(',');

  document.getElementById('bad').innerText =
    latest[1] + '%';

  document.getElementById('sauna').innerText =
    latest[2] + '%';

  document.getElementById('temp').innerText =
    latest[3] + '°C';

  document.getElementById('time').innerText =
    latest[0];
}

loadData();
</script>

</body>
</html>
