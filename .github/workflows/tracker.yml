name: Thermen Tracker

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 12 * * *'
    - cron: '0 17 * * *'

  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requests
        run: pip install requests

      - name: Run scraper
        run: python scripts/scrape_therme.py

      - name: Commit updated data
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add data/

          git commit -m "Update tracking data" || echo "No changes"

          git push
