name: Thermen Tracker

on:
  schedule:
    - cron: '0 7 * * *'
    - cron: '0 12 * * *'
    - cron: '0 17 * * *'

  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        run: python scripts/scrape_therme.py
